<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="에어컨보고서">
<meta name="theme-color" content="#3d8ef0">
<title>평택에어컨1004 - 작업 보고서</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0d0f18;--sf:#161924;--sf2:#1e2235;--sf3:#252a40;--bd:#2a2f47;--ac:#3d8ef0;--ac2:#00c9a7;--tx:#dde2f5;--mu:#7880a0;--dn:#f06060;--wn:#f0b429;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;}

/* HEADER - S22 친화적 */
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px;}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-ic{width:40px;height:40px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-tx{font-size:15px;font-weight:700;}.logo-sb{font-size:11px;color:var(--mu);margin-top:2px;}
.save-status{font-size:11px;padding:3px 9px;border-radius:12px;font-weight:600;opacity:0;transition:opacity .4s;}
.save-status.saving{background:rgba(240,180,41,.2);color:var(--wn);opacity:1;}
.save-status.saved{background:rgba(0,201,167,.15);color:var(--ac2);opacity:1;}
.save-status.hide{opacity:0;}
.hdr-fields{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;width:100%;}
.hf{display:flex;flex-direction:column;gap:3px;flex:1;min-width:100px;}
.hf label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
.hf input{background:var(--sf2);border:1px solid var(--bd);border-radius:7px;padding:9px 11px;color:var(--tx);font-family:inherit;font-size:14px;width:100%;}
.hf input:focus{outline:none;border-color:var(--ac);}
.hdr-btns{display:flex;gap:6px;flex-wrap:wrap;width:100%;}

/* BUTTONS - 터치 친화적 크기 */
.btn{padding:10px 14px;border-radius:8px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;touch-action:manipulation;min-height:40px;}
.btn:active{transform:scale(.96);}
.b-blue{background:linear-gradient(135deg,var(--ac),#5b6ef7);color:#fff;}
.b-green{background:linear-gradient(135deg,var(--ac2),#00a884);color:#0d1117;}
.b-orange{background:linear-gradient(135deg,#f0832a,#e05c10);color:#fff;}
.b-gold{background:linear-gradient(135deg,#e0a020,#c07010);color:#fff;}
.b-ghost{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);}
.b-ghost:hover,.b-ghost:active{border-color:var(--ac);color:var(--ac);}
.b-red{background:rgba(240,96,96,.15);border:1px solid var(--dn);color:var(--dn);}
.b-xs{padding:7px 11px;font-size:12px;border-radius:6px;min-height:34px;}
.btn:disabled{opacity:.4;pointer-events:none;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--mu);padding:5px 7px;font-size:15px;touch-action:manipulation;}
.del-btn{background:rgba(240,96,96,.1);border:1px solid var(--dn);cursor:pointer;color:var(--dn);font-size:12px;padding:5px 11px;border-radius:6px;font-family:inherit;font-weight:700;touch-action:manipulation;min-height:32px;}

/* MAIN */
.main{padding:14px;max-width:900px;margin:0 auto;padding-bottom:30px;}

.cmp-sec{display:none!important;}

/* STATS - 큰 숫자 */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:11px 10px;text-align:center;}
.stat-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;margin-bottom:4px;font-weight:600;}
.stat-val{font-size:24px;font-weight:900;font-family:'DM Mono',monospace;line-height:1;}
.c-bl{color:var(--ac);}.c-gr{color:var(--ac2);}.c-wn{color:var(--wn);}.c-mu{color:var(--mu);}

/* ADD ROW - 터치 친화 */
.add-row{display:flex;gap:7px;margin-bottom:10px;}
.add-inp{background:var(--sf);border:1px solid var(--bd);border-radius:9px;padding:12px 14px;color:var(--tx);font-family:inherit;font-size:15px;flex:1;min-width:0;}
.add-inp:focus{outline:none;border-color:var(--ac);}
.add-inp::placeholder{color:var(--mu);}
.toolbar{display:flex;gap:7px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.srch{flex:1;min-width:120px;background:var(--sf);border:1px solid var(--bd);border-radius:9px;padding:10px 13px;color:var(--tx);font-family:inherit;font-size:14px;}
.srch:focus{outline:none;border-color:var(--ac);}

/* UNIT CARDS - 가독성 향상 */
.unit-list{display:flex;flex-direction:column;gap:9px;}
.u-card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden;transition:border-color .2s;}
.u-card.done{border-color:rgba(0,201,167,.5);}
.u-card.part{border-color:rgba(240,180,41,.5);}
.u-top{display:grid;grid-template-columns:32px 1fr auto auto auto;gap:10px;align-items:center;padding:14px 14px;cursor:pointer;user-select:none;}
.u-num{font-family:'DM Mono',monospace;font-size:14px;color:var(--mu);text-align:center;font-weight:700;}
.u-name-row{display:flex;align-items:center;gap:6px;min-width:0;}
.u-name{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.u-name-inp{background:var(--sf2);border:1px solid var(--ac);border-radius:6px;padding:5px 10px;color:var(--tx);font-family:inherit;font-size:16px;font-weight:700;width:170px;}
.u-name-inp:focus{outline:none;}
.bdg{display:inline-flex;align-items:center;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;}
.bdg-ok{background:rgba(0,201,167,.15);color:var(--ac2);}
.bdg-pt{background:rgba(240,180,41,.15);color:var(--wn);}
.bdg-no{background:rgba(240,96,96,.1);color:var(--dn);}
.u-chev{font-size:14px;color:var(--mu);transition:transform .2s;flex-shrink:0;}
.u-chev.open{transform:rotate(180deg);}
.u-body{display:none;padding:0 14px 14px;border-top:1px solid var(--bd);}
.u-body.open{display:block;}
.ph-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.ph-lbl{font-size:13px;font-weight:700;padding:6px 11px;border-radius:6px;margin-bottom:7px;}
.lbl-b{background:rgba(240,96,96,.12);color:#ff8a80;}
.lbl-a{background:rgba(0,201,167,.12);color:var(--ac2);}
.up-btns{display:flex;gap:5px;margin-bottom:8px;}
.up-btn{flex:1;padding:11px 4px;border-radius:8px;border:1.5px dashed var(--bd);background:var(--sf2);color:var(--mu);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;position:relative;overflow:hidden;touch-action:manipulation;min-height:42px;}
.up-btn:active{border-color:var(--ac);color:var(--ac);}
.up-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.thumbs{display:flex;flex-wrap:wrap;gap:7px;}
.th-wrap{position:relative;flex-shrink:0;}
.th-wrap img{width:68px;height:68px;object-fit:cover;border-radius:7px;border:1px solid var(--bd);cursor:pointer;display:block;}
.th-del{position:absolute;top:-5px;right:-5px;width:20px;height:20px;background:var(--dn);border:none;border-radius:50%;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.th-save{position:absolute;bottom:-5px;right:-5px;width:20px;height:20px;background:var(--ac2);border:none;border-radius:50%;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;text-decoration:none;font-weight:700;}
.th-save-btn{position:absolute;bottom:-5px;right:-5px;width:22px;height:22px;background:var(--ac2);border:none;border-radius:50%;color:#0d1117;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;font-weight:900;font-family:inherit;padding:0;}
.th-save-btn:active{transform:scale(.9);}
.th-saved{position:absolute;bottom:-5px;left:-5px;width:20px;height:20px;background:#16a34a;border:none;border-radius:50%;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:2;}
.sp-sec{margin-top:12px;border-top:1px solid var(--bd);padding-top:11px;}
.sp-hdr{font-size:13px;font-weight:700;color:var(--wn);margin-bottom:8px;}
.sp-item{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:8px;position:relative;}
.sp-del{position:absolute;top:8px;right:8px;background:rgba(240,96,96,.15);border:1px solid var(--dn);color:var(--dn);cursor:pointer;font-size:11px;padding:4px 9px;border-radius:5px;font-family:inherit;font-weight:600;touch-action:manipulation;}
.sp-txt{width:100%;background:transparent;border:none;color:var(--tx);font-family:inherit;font-size:14px;resize:none;outline:none;min-height:50px;padding-right:60px;line-height:1.5;}
.sp-photos{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;align-items:center;}
.add-sp-btn{width:100%;padding:10px;background:rgba(240,180,41,.1);border:1.5px dashed var(--wn);border-radius:8px;color:var(--wn);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;touch-action:manipulation;min-height:42px;}
.add-sp-btn:active{background:rgba(240,180,41,.2);}
.empty{text-align:center;padding:50px 16px;color:var(--mu);}
.empty-ic{font-size:40px;opacity:.2;margin-bottom:10px;}

/* ── SAVE DIALOG ── */
.dlg-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;padding:20px;}
.dlg-backdrop.open{display:flex;}
.dlg-box{background:var(--sf);border:1px solid var(--bd);border-radius:14px;width:100%;max-width:420px;overflow:hidden;}
.dlg-head{padding:16px 18px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;}
.dlg-title{font-size:16px;font-weight:700;}
.dlg-body{padding:18px;}
.dlg-label{font-size:12px;color:var(--mu);margin-bottom:7px;}
.dlg-input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:11px 14px;color:var(--tx);font-family:inherit;font-size:15px;}
.dlg-input:focus{outline:none;border-color:var(--ac);}
.dlg-hint{font-size:10px;color:var(--mu);margin-top:6px;}
.dlg-foot{padding:12px 18px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;}

/* ── SAVE LIST MODAL ── */
.sl-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:flex-end;justify-content:center;}
.sl-modal.open{display:flex;}
.sl-box{background:var(--sf);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;}
.sl-head{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.sl-title{font-size:14px;font-weight:700;}
.sl-body{overflow-y:auto;padding:12px;flex:1;}
.sl-item{background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.sl-info{flex:1;cursor:pointer;min-width:0;}
.sl-name{font-size:13px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sl-meta{font-size:10px;color:var(--mu);}
.sl-btns{display:flex;gap:5px;flex-shrink:0;}
.sl-empty{text-align:center;padding:36px;color:var(--mu);font-size:12px;}
.sl-count{font-size:10px;color:var(--mu);text-align:center;padding:6px;border-top:1px solid var(--bd);margin-top:4px;}

/* PREVIEW */
.pv-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:200;flex-direction:column;}
.pv-modal.open{display:flex;}
.pv-bar{background:var(--sf);border-bottom:1px solid var(--bd);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.pv-title{font-size:13px;font-weight:700;}
.pv-btns{display:flex;gap:6px;}
.pv-scroll{flex:1;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:16px;background:#2a2a2a;}
.pv-pg-wrap{position:relative;}
.pv-pg-num{position:absolute;top:-16px;left:0;font-size:9px;color:#999;font-family:'DM Mono',monospace;}
.pv-pg-scaled{box-shadow:0 6px 28px rgba(0,0,0,.7);overflow:hidden;}

/* IMAGE MODAL */
.img-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:400;align-items:center;justify-content:center;}
.img-modal.open{display:flex;}
.img-modal img{max-width:95vw;max-height:92vh;border-radius:8px;object-fit:contain;}
.img-x{position:absolute;top:14px;right:14px;width:34px;height:34px;background:var(--sf);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;border:1px solid var(--bd);}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:500;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.ov-box{background:var(--sf);border:1px solid var(--bd);border-radius:13px;padding:26px 34px;text-align:center;min-width:230px;}
.ov-title{font-size:13px;font-weight:700;margin-bottom:11px;}
.prog-tr{height:5px;background:var(--sf3);border-radius:3px;overflow:hidden;}
.prog-fl{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:3px;transition:width .3s;width:0%;}
.prog-lb{font-size:10px;color:var(--mu);margin-top:7px;}

/* TOAST - 가독성 향상 */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--sf2);border:1.5px solid var(--bd);border-radius:10px;padding:13px 20px;font-size:14px;font-weight:700;z-index:600;opacity:0;transition:opacity .25s;pointer-events:none;max-width:92vw;text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.4);}
.toast.show{opacity:1;}
.toast.ok{border-color:var(--ac2);color:var(--ac2);background:rgba(0,201,167,.08);}
.toast.err{border-color:var(--dn);color:var(--dn);}

/* ═══════════════════════════
   REPORT PAGE STYLES
═══════════════════════════ */
.rpage{width:794px;background:#fff;color:#111;font-family:'Noto Sans KR',sans-serif;position:relative;}

/* ── 표지 (Cover) ── */
.rp-cover{height:1123px;display:flex;flex-direction:column;overflow:hidden;background:#fafbfc;}

/* HERO */
.rp-hero{
  flex-shrink:0;
  background:linear-gradient(135deg,#0a1628 0%,#1e3a5f 50%,#2c5282 100%);
  padding:44px 48px 40px;position:relative;overflow:hidden;color:#fff;
}
.rp-hero::before{content:'';position:absolute;top:-50%;right:-20%;width:460px;height:460px;background:radial-gradient(circle,rgba(77,208,225,.22) 0%,transparent 60%);border-radius:50%;filter:blur(40px);}
.rp-hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:360px;height:360px;background:radial-gradient(circle,rgba(128,222,234,.12) 0%,transparent 60%);border-radius:50%;filter:blur(40px);}
.rp-snw{position:absolute;color:rgba(255,255,255,.08);pointer-events:none;}
.rp-snw:nth-child(1){top:24px;right:70px;font-size:22px;opacity:.4;}
.rp-snw:nth-child(2){top:70px;right:160px;font-size:14px;opacity:.3;}
.rp-snw:nth-child(3){bottom:80px;right:50px;font-size:28px;opacity:.2;}
.rp-snw:nth-child(4){top:120px;right:34px;font-size:12px;opacity:.5;}

.rp-hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;position:relative;z-index:2;}
.rp-brand{display:flex;align-items:center;gap:13px;}
.rp-brand-logo{width:48px;height:48px;background:linear-gradient(135deg,#4dd0e1,#80deea);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 8px 22px rgba(77,208,225,.35);}
.rp-brand-name{font-size:20px;font-weight:800;letter-spacing:-.02em;}
.rp-brand-tag{font-size:10px;color:#80deea;font-weight:500;letter-spacing:.14em;text-transform:uppercase;margin-top:2px;}
.rp-rpt-badge{text-align:right;position:relative;z-index:2;}
.rp-rpt-badge-lbl{font-size:9px;letter-spacing:.18em;color:#80deea;font-weight:600;text-transform:uppercase;margin-bottom:3px;}
.rp-rpt-badge-num{font-size:12px;color:rgba(255,255,255,.65);letter-spacing:.05em;}

.rp-hero-title{position:relative;z-index:2;}
.rp-eyebrow{display:inline-block;padding:5px 13px;background:rgba(77,208,225,.15);border:1px solid rgba(77,208,225,.3);border-radius:100px;font-size:10px;font-weight:600;color:#80deea;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;}
.rp-h1{font-size:38px;font-weight:900;letter-spacing:-.03em;line-height:1.15;margin-bottom:10px;}
.rp-h1 .rp-accent{background:linear-gradient(135deg,#4dd0e1,#80deea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.rp-sub{font-size:13px;color:rgba(255,255,255,.65);font-weight:400;margin-bottom:28px;}

.rp-meta-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:1px;background:rgba(255,255,255,.1);border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.08);position:relative;z-index:2;}
.rp-meta-cell{background:rgba(10,22,40,.4);padding:13px 16px;}
.rp-meta-lbl{font-size:9px;color:#80deea;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.rp-meta-val{font-size:13px;font-weight:600;color:#fff;letter-spacing:-.01em;}

/* KPI 카드 */
.rp-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:22px 48px 0;}
.rp-kpi{padding:16px 15px;background:#fff;border:1px solid rgba(10,22,40,.08);border-radius:12px;}
.rp-kpi.rp-khi{background:linear-gradient(135deg,#f0fdfa,#ecfeff);border-color:rgba(77,208,225,.3);}
.rp-kpi.rp-kwn{background:linear-gradient(135deg,#fff7ed,#fffbeb);border-color:rgba(243,156,18,.25);}
.rp-kpi-lbl{font-size:10px;color:#64748b;font-weight:500;margin-bottom:6px;}
.rp-kpi-num{font-size:26px;font-weight:900;letter-spacing:-.03em;color:#0a1628;}
.rp-kpi-unit{font-size:12px;color:#64748b;font-weight:500;margin-left:2px;}
.rp-khi .rp-kpi-num{color:#0e7490;}
.rp-kwn .rp-kpi-num{color:#c2410c;}

/* 목록 */
.rp-list-wrap{flex:1;padding:16px 48px 0;overflow:hidden;}
.rp-list-title{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.rp-list-bar{width:4px;height:16px;background:linear-gradient(180deg,#1e3a5f,#4dd0e1);border-radius:4px;}
.rp-list-txt{font-size:14px;font-weight:700;color:#0a1628;letter-spacing:-.02em;}
.rp-list-cnt{margin-left:auto;font-size:11px;color:#64748b;}

.rp-wtbl{width:100%;background:#fff;border:1px solid rgba(10,22,40,.08);border-radius:12px;overflow:hidden;border-collapse:separate;border-spacing:0;}
.rp-wtbl thead th{background:#f8fafc;padding:11px 13px;font-size:10px;font-weight:700;color:#475569;letter-spacing:.05em;text-transform:uppercase;text-align:left;border-bottom:1px solid rgba(10,22,40,.08);}
.rp-wtbl thead th.tc{text-align:center;}
.rp-wtbl tbody td{padding:12px 13px;font-size:12px;color:#0a1628;border-bottom:1px solid rgba(10,22,40,.06);}
.rp-wtbl tbody tr:last-child td{border-bottom:none;}
.rp-wtbl tbody td.tc{text-align:center;}

<script>
'use strict';
/* ═══════════════════════════════
   IndexedDB  ─  용량 무제한 저장
═══════════════════════════════ */
const DB_NAME = 'AirconReportDB';
const DB_VER  = 2;           // ← 버전 올려서 settings 스토어 추가
const STORE   = 'saves';
const SETTINGS_STORE = 'settings';
let   db      = null;
let   photoFolderHandle = null;   // 저장 폴더 핸들 (메모리 캐시)

function openDB() {
  return new Promise((res, rej) => {
    if (db) { res(db); return; }
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        const s = d.createObjectStore(STORE, { keyPath:'saveId' });
        s.createIndex('savedAt','savedAt',{unique:false});
      }
      // v2: settings 스토어 (폴더 핸들 등 저장)
      if (!d.objectStoreNames.contains(SETTINGS_STORE)) {
        d.createObjectStore(SETTINGS_STORE, { keyPath:'key' });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = e => rej(e.target.error);
  });
}

// settings 스토어 get/put
async function settingsGet(key) {
  const d = await openDB();
  return new Promise((res, rej) => {
    const tx  = d.transaction(SETTINGS_STORE,'readonly');
    const req = tx.objectStore(SETTINGS_STORE).get(key);
    req.onsuccess = () => res(req.result ? req.result.value : null);
    req.onerror   = e => rej(e.target.error);
  });
}
async function settingsPut(key, value) {
  const d = await openDB();
  return new Promise((res, rej) => {
    const tx  = d.transaction(SETTINGS_STORE,'readwrite');
    const req = tx.objectStore(SETTINGS_STORE).put({ key, value });
    req.onsuccess = () => res();
    req.onerror   = e => rej(e.target.error);
  });
}

function dbGet(saveId) {
  return new Promise(async (res, rej) => {
    try {
      const d = await openDB();
      const tx  = d.transaction(STORE,'readonly');
      const req = tx.objectStore(STORE).get(saveId);
      req.onsuccess = () => res(req.result || null);
      req.onerror   = e => rej(e.target.error);
    } catch(e) { rej(e); }
  });
}

async function dbGetAll() {
  const d = await openDB();
  return new Promise((res, rej) => {
    const tx  = d.transaction(STORE,'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => res(req.result.sort((a,b)=>b.savedAt.localeCompare(a.savedAt)));
    req.onerror   = e => rej(e.target.error);
  });
}

async function dbPut(obj) {
  const d = await openDB();
  return new Promise((res, rej) => {
    const tx  = d.transaction(STORE,'readwrite');
    const req = tx.objectStore(STORE).put(obj);
    req.onsuccess = () => res();
    req.onerror   = e => rej(e.target.error);
  });
}

async function dbDelete(saveId) {
  const d = await openDB();
  return new Promise((res, rej) => {
    const tx  = d.transaction(STORE,'readwrite');
    const req = tx.objectStore(STORE).delete(saveId);
    req.onsuccess = () => res();
    req.onerror   = e => rej(e.target.error);
  });
}

  document.getElementById('workDate').value = new Date().toISOString().split('T')[0];

  try {
    const ci = JSON.parse(localStorage.getItem(CO_KEY)||'{}');

  ['coName','coTel','coBiz','coDesc'].forEach(id => {

    if (el) el.addEventListener('input', updateCoPreview);

    if (s && s.units && s.units.length > 0) {
      const ago = Math.round((Date.now() - new Date(s.savedAt).getTime()) / 60000);
      const msg = ago < 60
        ? `${ago}분 전 작업이 있습니다 (${s.units.length}개 호수)\n복원할까요?`
        : `이전 작업이 있습니다 (${s.units.length}개 호수, ${Math.round(ago/60)}시간 전)\n복원할까요?`;
      if (confirm(msg)) {

        document.getElementById('aptName').value    = s.apt||'';
        document.getElementById('workDate').value   = s.date||new Date().toISOString().split('T')[0];

  // ── 뒤로가기 차단 ──
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => {
    history.pushState(null, '', location.href);
    if (units.length > 0) {
      showToast('뒤로가기는 차단됩니다 — 💾 저장 버튼을 이용해주세요', 'err');
    }
  });

  // ── 페이지 이탈 경고 ──
  window.addEventListener('beforeunload', e => {
    if (units.length > 0) {
      e.preventDefault();
      e.returnValue = '작업 중인 내용이 있습니다. 페이지를 떠나면 저장되지 않은 내용이 사라질 수 있습니다.';
      return e.returnValue;
    }
  });

  // ── 앱 숨김/보임 시 자동저장 (화면 전환 대응) ──
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden' && units.length > 0) {
      sessionAutoSaveNow();
    }
  });

  // ── 화면 포커스 해제 시 저장 ──
  window.addEventListener('pagehide', () => {
    if (units.length > 0) sessionAutoSaveNow();
  });

  // 자동다운로드 설정 복원
  try {
    const ad = localStorage.getItem('ac_auto_dl');
    if (ad === '1') {
      const el = document.getElementById('autoDownload');
      if (el) el.checked = true;
    }
  } catch(e){}
  const adEl = document.getElementById('autoDownload');
  if (adEl) adEl.addEventListener('change', e => {
    try { localStorage.setItem('ac_auto_dl', e.target.checked ? '1' : '0'); } catch(e2){}
  });

  // ── 자동저장 폴더 복원 ──
  await initPhotoFolder();

  bindAll();
  renderAll();
  updateStats();

  if ('serviceWorker' in navigator)
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

    files.forEach(f => {

          const cropNote = wasCropped ? ' · 세로→가로 변환' : '';
          showToast(`📸 ${files.length}장${cropNote} | ${totalOrig}KB → ${totalNew}KB (${ratio}% 절감)`, 'ok');

/* ═══════════════════════════════
   UNIT OPERATIONS
═══════════════════════════════ */
function findU(id){ return units.find(u=>u.id===id); }

/* ── 사진 객체 헬퍼 (중복 방지를 위한 ID 시스템) ──
   사진 저장 형태:
   - 신규: { id: 'p_xxx', dataUrl: 'data:image/...', savedToFolder: false }
   - 구버전 호환: 'data:image/...' (문자열) → 자동으로 객체로 정규화
*/
let _photoIdCounter = 0;
function newPhotoId() {
  return `p_${Date.now()}_${++_photoIdCounter}`;
}
function makePhoto(dataUrl) {
  return { id: newPhotoId(), dataUrl, savedToFolder: false };
}
// 사진의 dataUrl 추출 (객체든 문자열이든)
function photoUrl(p) {
  return typeof p === 'string' ? p : p.dataUrl;
}
// 사진의 ID 추출 (없으면 즉석 생성)
function photoId(p) {
  if (typeof p === 'string') return null;
  return p.id;
}
// 배열을 객체 배열로 정규화 (문자열은 객체로 변환)
function normalizePhotos(arr) {
  if (!Array.isArray(arr)) return [];
  return arr.map(p => {
    if (typeof p === 'string') return makePhoto(p);
    if (!p.id) p.id = newPhotoId();
    if (typeof p.savedToFolder !== 'boolean') p.savedToFolder = false;
    return p;
  });
}
// units 전체 정규화 (불러오기 / 세션 복원 시 호출)
function normalizeUnits(arr) {
  return (arr||[]).map(u => ({
    ...u,
    before: normalizePhotos(u.before),
    after:  normalizePhotos(u.after),
    specials: (u.specials||[]).map(s => ({
      ...s,
      photos: normalizePhotos(s.photos)
    }))
  }));
}

function addUnit(name) {
  const inp=document.getElementById('newName');
  const n=(name!==undefined?name:inp.value).trim();
  if(!n){ showToast('호수명을 입력해주세요','err'); return; }
  units.push({id:nid++,name:n,before:[],after:[],specials:[],open:true});
  if(name===undefined){ inp.value=''; inp.focus(); }
  renderAll(); updateStats(); sessionAutoSave();
  showToast(`✅ "${n}" 호수가 추가되었습니다`, 'ok');
}

function bulkAdd() {
  const raw=prompt('여러 호수를 줄바꿈으로 입력:\n\n예)\n101동 201호\n101동 202호\n101동 203호');
  if(!raw) return;
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  lines.forEach(l=>units.push({id:nid++,name:l,before:[],after:[],specials:[],open:false}));
  renderAll(); updateStats(); sessionAutoSave();
  showToast(`${lines.length}개 호수 추가됨`,'ok');
}

function deleteUnit(id) {
  if(!confirm('이 호수를 삭제할까요?')) return;
  units=units.filter(u=>u.id!==id);
  renderAll(); updateStats(); sessionAutoSave();
}

function startEdit(id) {
  const u=findU(id); if(!u) return;
  const el=document.getElementById(`nm-${id}`); if(!el) return;
  const inp=document.createElement('input');
  inp.className='u-name-inp'; inp.value=u.name;

  inp.addEventListener('blur',()=>{ u.name=inp.value.trim()||u.name; renderAll(); updateStats(); sessionAutoSave(); });
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key==='Escape') inp.blur(); e.stopPropagation(); });
  el.replaceWith(inp); inp.focus(); inp.select();
}

function clearAll() {
  if(!confirm('모든 호수와 사진을 초기화할까요?')) return;
  units=[]; nid=1;
  document.getElementById('rpWrap').innerHTML='';
  document.getElementById('btnPDF').disabled=true;
  document.getElementById('btnJPG').disabled=true;

/* ═══════════════════════════════
   RENDER
═══════════════════════════════ */
function renderAll() {
  const q=document.getElementById('srch').value.trim().toLowerCase();
  const filtered=q?units.filter(u=>u.name.toLowerCase().includes(q)):units;
  const el=document.getElementById('uList');

  if(units.length===0){ el.innerHTML=`<div class="empty"><div class="empty-ic">🏠</div><p>위에서 호수를 추가해주세요</p></div>`; return; }
  if(filtered.length===0){ el.innerHTML=`<div class="empty"><div class="empty-ic">🔍</div><p>검색 결과 없음</p></div>`; return; }

  el.innerHTML=filtered.map(u=>{
    const ri=units.indexOf(u);
    const hB=u.before.length>0, hA=u.after.length>0;
    const scls=(hB&&hA)?'done':(hB||hA)?'part':'';
    const badge=(hB&&hA)?`<span class="bdg bdg-ok">✅ 완료</span>`
      :(hB||hA)?`<span class="bdg bdg-pt">⚠️ ${hB?`전${u.before.length}`:''}${hA?`후${u.after.length}`:''}장</span>`
      :`<span class="bdg bdg-no">사진없음</span>`;

    const makeThumbs=(arr,type)=>arr.map((p,idx)=>{
      const src = photoUrl(p);
      const saved = (typeof p === 'object' && p.savedToFolder);
      return `<div class="th-wrap" title="${saved?'폴더 저장됨':''}">
        <img src="${src}" alt="">
        ${saved?'<span class="th-saved">✓</span>':''}

        <button class="th-save-btn" data-uid="${u.id}" data-type="${type}" data-idx="${idx}" title="폴더로 저장">↓</button>
      </div>`;
    }).join('');

    const makeSpThumbs=(s)=>s.photos.map((p,idx)=>{
      const src = photoUrl(p);
      const saved = (typeof p === 'object' && p.savedToFolder);
      return `<div class="th-wrap" title="${saved?'폴더 저장됨':''}">
        <img src="${src}" style="width:50px;height:50px;object-fit:cover;border-radius:5px;border:1px solid var(--bd);cursor:pointer;" alt="">
        ${saved?'<span class="th-saved" style="font-size:8px;width:13px;height:13px;">✓</span>':''}
        <button class="th-del sp-th-del" data-uid="${u.id}" data-sid="${s.id}" data-idx="${idx}">✕</button>
        <button class="th-save-btn sp-save-btn" data-uid="${u.id}" data-sid="${s.id}" data-idx="${idx}" title="폴더로 저장" style="width:15px;height:15px;font-size:8px;">↓</button>
      </div>`;
    }).join('');

            ${makeUpload('after')}

  }).join('');
}

function updateStats() {
  const t=units.length;
  const c=units.filter(u=>u.before.length>0&&u.after.length>0).length;
  const p=units.filter(u=>(u.before.length>0||u.after.length>0)&&!(u.before.length>0&&u.after.length>0)).length;
  const ph=units.reduce((s,u)=>s+u.before.length+u.after.length+u.specials.reduce((a,sp)=>a+sp.photos.length,0),0);
  document.getElementById('sTot').textContent=t;
  document.getElementById('sCmp').textContent=c;
  document.getElementById('sPrt').textContent=p;
  document.getElementById('sPh').textContent=ph;
  document.getElementById('btnGen').disabled=t===0;
}

function openSaveDialog() {
  if(units.length===0){ showToast('저장할 호수가 없습니다','err'); return; }
  const apt=document.getElementById('aptName').value||'';
  const date=document.getElementById('workDate').value||'';
  const suggested=apt&&date?`${apt} (${date})`:(apt||'작업내용');
  const inp=document.getElementById('saveNameInp');
  inp.value=suggested;
  document.getElementById('saveHint').textContent=`제안: "${suggested}"`;
  document.getElementById('saveDlg').classList.add('open');
  setTimeout(()=>{ inp.focus(); inp.select(); },100);
}

function closeSaveDialog() {
  document.getElementById('saveDlg').classList.remove('open');
}

async function doSave() {
  const name=document.getElementById('saveNameInp').value.trim();
  if(!name){ showToast('저장 이름을 입력해주세요','err'); return; }
  closeSaveDialog();
  showOverlay('저장 중...');
  try {
    const saveId='sv_'+Date.now();
    const obj = {
      saveId,
      label:       name,
      apt:         document.getElementById('aptName').value,
      date:        document.getElementById('workDate').value,
      savedAt:     new Date().toISOString(),
      worker:      document.getElementById('workerName').value,
      companyName: document.getElementById('coName').value,
      companyTel:  document.getElementById('coTel').value,
      companyDesc: document.getElementById('coDesc').value,
      units:       JSON.parse(JSON.stringify(units)), // deep copy
      nid
    };
    await dbPut(obj);
    hideOverlay();
    showToast(`"${name}" 저장 완료 ✓`,'ok');
  } catch(e) {
    hideOverlay();
    showToast('저장 실패: '+e.message,'err');
  }
}

async function openLoadList() {
  document.getElementById('slModal').classList.add('open');
  const body=document.getElementById('slBody');
  body.innerHTML=`<div class="sl-empty">⏳ 불러오는 중...</div>`;
  try {
    const saves=await dbGetAll();
    if(saves.length===0){
      body.innerHTML=`<div class="sl-empty">💾 저장된 작업이 없습니다<br><small style="color:var(--mu);font-size:10px;margin-top:8px;display:block">저장 버튼을 눌러 작업을 저장해보세요</small></div>`;
      return;
    }
    body.innerHTML=saves.map(s=>{
      const d=new Date(s.savedAt);
      const ts=d.toLocaleString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      const uc=(s.units||[]).length;
      const cc=(s.units||[]).filter(u=>u.before.length>0&&u.after.length>0).length;
      const phc=(s.units||[]).reduce((a,u)=>a+u.before.length+u.after.length,0);
      return `<div class="sl-item" data-sid="${s.saveId}">
        <div class="sl-info" data-load="${s.saveId}">
          <div class="sl-name">📁 ${escH(s.label)}</div>
          <div class="sl-meta">${ts} · ${uc}호수 · 완료 ${cc}건 · 사진 ${phc}장</div>
        </div>
        <div class="sl-btns">
          <button class="btn b-blue b-xs" data-load="${s.saveId}">불러오기</button>
          <button class="btn b-red b-xs" data-del="${s.saveId}">삭제</button>
        </div>
      </div>`;
    }).join('')+`<div class="sl-count">총 ${saves.length}개 저장됨</div>`;

    // 이벤트 — 목록 내부 클릭
    body.addEventListener('click', async e=>{
      const loadEl=e.target.closest('[data-load]');
      const delEl =e.target.closest('[data-del]');
      if(loadEl){ await doLoad(loadEl.dataset.load); return; }
      if(delEl) { await doDelSave(delEl.dataset.del); return; }
    });
  } catch(e) {
    body.innerHTML=`<div class="sl-empty">오류: ${e.message}</div>`;
  }
}

async function doLoad(saveId) {
  if(units.length>0&&!confirm('현재 작업이 사라집니다.\n불러올까요?')) return;
  showOverlay('불러오는 중...');
  try {
    const saves=await dbGetAll();
    const s=saves.find(x=>x.saveId===saveId);
    if(!s) throw new Error('항목을 찾을 수 없습니다');
    units=normalizeUnits(s.units);
    nid=s.nid||units.length+1;
    document.getElementById('aptName').value=s.apt||'';
    document.getElementById('workDate').value=s.date||'';
    document.getElementById('workerName').value=s.worker||'';
    document.getElementById('coName').value=s.companyName||'';
    document.getElementById('coTel').value=s.companyTel||'';
    document.getElementById('coDesc').value=s.companyDesc||'';
    renderAll(); updateStats();
    document.getElementById('slModal').classList.remove('open');
    hideOverlay();
    showToast(`"${s.label}" 불러오기 완료`,'ok');
  } catch(e) {
    hideOverlay(); showToast('불러오기 실패: '+e.message,'err');
  }
}

async function doDelSave(saveId) {
  const saves=await dbGetAll();
  const s=saves.find(x=>x.saveId===saveId);
  if(!s||!confirm(`"${s.label}"\n삭제할까요?`)) return;
  await dbDelete(saveId);
  await openLoadList();
  showToast('삭제됨','ok');
}

    <!-- KPI -->

        <div><span class="rp-kpi-num">${total}</span><span class="rp-kpi-unit">호</span></div>

    </div>`:''}

    <!-- 업체정보 카드 -->
    <div class="rp-co-card">
      <div class="rp-co-card-title">📌 업체 정보</div>
      <div class="rp-co-card-grid">
        <div class="rp-co-card-row"><span class="rp-co-card-lbl">업체명</span><span class="rp-co-card-val">${escH(coName)}</span></div>
        ${coTel  ? `<div class="rp-co-card-row"><span class="rp-co-card-lbl">📞 연락처</span><span class="rp-co-card-val">${escH(coTel)}</span></div>` : ''}

      </div>

    <!-- 표지 푸터 -->
    <div class="rp-cv-foot">
      <div><span class="rp-cv-foot-brand">${escH(coName)}</span>${coTel?` · ${escH(coTel)}`:''}</div>
      <div>— 1 / ${1+units.reduce((s,u)=>{
        const bc=chunk(u.before,3).length, ac=chunk(u.after,3).length;
        let pc=Math.max(bc,ac,1);
        const sc = u.specials.length;
        // 특이사항 1~2건 인라인: 마지막 페이지 사진 3장이면 +1 페이지
        if(sc>=1 && sc<=2){
          const lb=(chunk(u.before,3)[pc-1]||[]).length;
          const la=(chunk(u.after,3)[pc-1]||[]).length;
          if(lb>2||la>2) pc++;
        }
        // 특이사항 3건 이상: 각 특이사항별 별도 페이지(사진 4장씩)
        if(sc>=3){
          u.specials.forEach(sp=>{
            const phc = chunk(sp.photos, 4).length;
            pc += Math.max(phc, 1);
          });
        }
        return s+pc;
      },0)} —</div>

  </div>`;

  /* ── 호수별 상세 페이지 ──
     규칙:
     - 일반 페이지: 사진 3장 × 2열
     - 특이사항 1~2건: 마지막 본페이지 하단에 인라인 (사진 + 텍스트), 본 사진은 2장으로 줄임
     - 특이사항 3건 이상: 별도 페이지 (페이지당 사진 4장 + 텍스트)
  */
  units.forEach((u, unitIdx) => {
    const specCount    = u.specials.length;
    const inlineSpec   = specCount >= 1 && specCount <= 2;   // 1~2건 인라인
    const separateSpec = specCount >= 3;                      // 3건 이상 별도 페이지

    // 1) 일반 사진 페이지네이션 (3장씩)
    let bChunks = chunk(u.before, 3);
    let aChunks = chunk(u.after,  3);
    let normalPages = Math.max(bChunks.length, aChunks.length, 1);

    // 2) 인라인 특이사항이면 마지막 본페이지에 사진 2장만 들어가도록 조정
    if (inlineSpec) {
      const lastB = bChunks[normalPages-1] || [];
      const lastA = aChunks[normalPages-1] || [];
      if (lastB.length > 2 || lastA.length > 2) {
        const extraB = lastB.slice(2);
        const extraA = lastA.slice(2);
        while (bChunks.length < normalPages) bChunks.push([]);
        while (aChunks.length < normalPages) aChunks.push([]);
        bChunks[normalPages-1] = lastB.slice(0, 2);
        aChunks[normalPages-1] = lastA.slice(0, 2);
        bChunks.push(extraB);
        aChunks.push(extraA);
        normalPages++;
      }
    }

    // 3) 특이사항 별도 페이지 (3건 이상) — 각 특이사항을 페이지로
    //    특이사항 1건당 사진 최대 4장, 초과 시 다음 페이지로
    const specPages = [];
    if (separateSpec) {
      u.specials.forEach((sp, spIdx) => {
        const phChunks = chunk(sp.photos, 4);
        if (phChunks.length === 0 || (phChunks.length === 1 && phChunks[0].length === 0)) {
          // 사진 없는 특이사항도 1페이지 차지
          specPages.push({ specIdx: spIdx, special: sp, photos: [], page: 1, totalPages: 1 });
        } else {
          phChunks.forEach((photoSlice, pi) => {
            specPages.push({
              specIdx: spIdx,
              special: sp,
              photos: photoSlice,
              page: pi + 1,
              totalPages: phChunks.length
            });
          });
        }
      });
    }

    const totalPagesForUnit = normalPages + specPages.length;

    // ── 일반 사진 페이지 렌더 ──
    for(let p=0; p<normalPages; p++){
      const bSlice = bChunks[p] || [];
      const aSlice = aChunks[p] || [];
      const isFirst    = p===0;
      const isLastNorm = p===normalPages-1;
      const showInlineSpec = isLastNorm && inlineSpec;
      const slotsPerCol    = showInlineSpec ? 2 : 3;

      const pageNo = p + 1;
      const pageLabel = totalPagesForUnit>1 ? ` (${pageNo}/${totalPagesForUnit}쪽)` : '';
      const unitTitle = isFirst
        ? `❄️ ${escH(u.name)}`
        : `❄️ ${escH(u.name)} <span style="font-size:11px;font-weight:400;color:#666">사진 ${p+1}/${normalPages}</span>`;

      html += `<div class="rpage rp-det">
        ${headBar(`${escH(apt)} | ${dateStr} | 담당: ${escH(worker)}`)}
        <div class="rp-ubar">
          <div class="rp-uname">${unitTitle}</div>
          <div class="rp-umeta">${unitIdx+1} / ${units.length}${pageLabel} | 전 ${u.before.length}장 · 후 ${u.after.length}장${specCount?` · 특이 ${specCount}건`:''}</div>
        </div>
        <div class="rp-photos${showInlineSpec?' has-sp':''}">
          <div class="rp-col">
            <div class="rp-clbl rp-lbl-b">🔴 작업 전 (BEFORE)${bSlice.length?` — ${p*3+1}~${p*3+bSlice.length}장`:''}</div>
            ${colPhotosFn(bSlice, slotsPerCol)}
          </div>
          <div class="rp-col">
            <div class="rp-clbl rp-lbl-a">🟢 작업 후 (AFTER)${aSlice.length?` — ${p*3+1}~${p*3+aSlice.length}장`:''}</div>
            ${colPhotosFn(aSlice, slotsPerCol)}
          </div>
        </div>
        ${showInlineSpec ? inlineSpecialSection(u.specials) : ''}
        <div class="rp-foot">
          <span>${escH(coName)} | ${escH(apt)} | ${escH(u.name)}${pageLabel}</span>
          <div>확인:<span class="sign-ln"></span></div>
        </div>
      </div>`;
    }

    // ── 특이사항 별도 페이지 렌더 (3건 이상일 때) ──
    specPages.forEach((spInfo, idx) => {
      const pageNo = normalPages + idx + 1;
      const pageLabel = ` (${pageNo}/${totalPagesForUnit}쪽)`;
      const subPageInfo = spInfo.totalPages > 1 ? ` (${spInfo.page}/${spInfo.totalPages})` : '';

      html += `<div class="rpage rp-det">
        ${headBar(`${escH(apt)} | ${dateStr} | 담당: ${escH(worker)}`)}
        <div class="rp-ubar" style="background:#fffbf0;border-bottom:2px solid #f0b429;">
          <div class="rp-uname" style="color:#c07010;">⚠️ ${escH(u.name)} 특이사항 ${spInfo.specIdx+1}/${specCount}${subPageInfo}</div>
          <div class="rp-umeta">${unitIdx+1} / ${units.length}${pageLabel}</div>
        </div>
        ${specialPageBody(spInfo.special, spInfo.photos, spInfo.page === spInfo.totalPages)}
        <div class="rp-foot">
          <span>${escH(coName)} | ${escH(apt)} | ${escH(u.name)} 특이사항</span>
          <div>확인:<span class="sign-ln"></span></div>
        </div>
      </div>`;
    });
  });

  // ── 헬퍼: 사진 슬롯 채우기 (n슬롯 고정) ──
  function colPhotosFn(photos, slots) {
    const items = [];
    for (let i = 0; i < slots; i++) {
      if (i < photos.length) {
        items.push(`<div class="rp-pitem"><img src="${photoUrl(photos[i])}"></div>`);
      } else {
        items.push(`<div class="rp-pitem empty"></div>`);
      }
    }
    return `<div class="rp-plist">${items.join('')}</div>`;
  }

  // ── 헬퍼: 특이사항 1~2건 - 본 페이지 하단에 들어가는 인라인 섹션 ──
  function inlineSpecialSection(specials) {
    // specials: 배열 (1건 또는 2건)
    const count = specials.length;

    // 사진 모으기 (모든 특이사항의 사진 합쳐서 최대 2장)
    const allPhotos = specials.flatMap(s => s.photos);
    const photos    = allPhotos.slice(0, 2);
    const extra     = allPhotos.length - photos.length;

    // 사진 슬롯
    const photoSlots = [];
    for (let i = 0; i < 2; i++) {
      if (i < photos.length) {
        photoSlots.push(`<div class="rp-pitem"><img src="${photoUrl(photos[i])}"></div>`);
      } else {
        photoSlots.push(`<div class="rp-pitem empty"></div>`);
      }
    }

    // 텍스트 (각 특이사항 번호별로)
    const textBody = specials.map((s, i) => {
      const t = (s.desc || '').trim();
      const prefix = count > 1 ? `<strong>${i+1}.</strong> ` : '';
      return prefix + (t ? escH(t).replace(/\n/g,'<br>') : '<span style="color:#aaa">(설명 없음)</span>');
    }).join('<br>');

    return `<div class="rp-sp-sec">
      <div class="rp-sp-titlebar">
        <span class="ic">⚠️ 특이사항 (${count}건${allPhotos.length?` · 사진 ${allPhotos.length}장`:''})</span>
      </div>
      <div class="rp-sp-grid">${photoSlots.join('')}</div>
      <div class="rp-sp-text">
        ${extra > 0 ? `<span class="extra-cnt">+ ${extra}장 더</span>` : ''}
        ${textBody}
      </div>
    </div>`;
  }

  // ── 헬퍼: 특이사항 별도 페이지 본문 (2건 이상일 때) ──
  function specialPageBody(sp, photoSlice, showText) {
    // 사진 4장 = 2x2 그리드
    const photoSlots = [];
    for (let i = 0; i < 4; i++) {
      if (i < photoSlice.length) {
        photoSlots.push(`<div class="rp-pitem"><img src="${photoUrl(photoSlice[i])}"></div>`);
      } else {
        photoSlots.push(`<div class="rp-pitem empty"></div>`);
      }
    }

    const text = (sp.desc || '').trim();
    const textHtml = showText
      ? `<div class="rp-sp-text" style="max-height:120px;">
           ${text ? escH(text).replace(/\n/g,'<br>') : '<span style="color:#aaa">(설명 없음)</span>'}
         </div>`
      : `<div class="rp-sp-text" style="max-height:40px;text-align:center;color:var(--mu);font-style:italic;">
           ⏬ 다음 페이지에 이어집니다
         </div>`;

    return `<div class="rp-sp-page-photos">${photoSlots.join('')}</div>${textHtml}`;
  }

  return html;
}

// base64 dataURL → Blob  (동기 방식)
function dataURLtoBlob(dataUrl) {
  if (!dataUrl || typeof dataUrl !== 'string') {
    throw new Error('dataUrl이 비어있음');
  }
  const i = dataUrl.indexOf(',');
  if (i < 0) throw new Error('잘못된 dataUrl 형식');

  const meta = dataUrl.slice(0, i);
  const b64  = dataUrl.slice(i + 1);
  const mimeMatch = meta.match(/data:([^;]+)/);
  const mime = mimeMatch ? mimeMatch[1] : 'image/jpeg';

  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let j = 0; j < bin.length; j++) arr[j] = bin.charCodeAt(j);

  const blob = new Blob([arr], { type: mime });
  if (blob.size === 0) {
    throw new Error(`Blob 생성 실패 — bin len: ${bin.length}, b64 len: ${b64.length}`);
  }
  return blob;
}

// Blob 을 파일에 쓰기 — 가장 단순한 방식 (truncate, getFile 사용 안 함)
// truncate와 getFile은 Android Chrome에서 InvalidStateError를 일으킴
async function writeBlobToFile(fh, blob) {
  if (!blob || blob.size === 0) {
    throw new Error('빈 Blob');
  }

  // 단일 시도 — Blob을 직접 write에 전달 (가장 호환성 높음)
  // ※ truncate() 호출 안 함, getFile() 검증 안 함
  const w = await fh.createWritable();
  try {
    await w.write(blob);
    await w.close();
  } catch(e) {
    // 실패시 abort로 깨끗하게 정리
    try { await w.abort(); } catch(_) {}
    throw e;
  }
}

// ───────── 저장 대기 큐 (사진 ID 기반 중복 방지) ─────────

// 인덱스 카운터 — 디렉토리 조회 없이 메모리에서만 관리
// 키: "folder/unit/typeLabel" → 다음 인덱스
const _indexCounter = new Map();

async function findNextFileIndex(unitDir, typeLabel) {
  const date = document.getElementById('workDate').value || new Date().toISOString().split('T')[0];
  const apt  = document.getElementById('aptName').value  || '작업';
  const key  = `${date}_${apt}/${unitDir.name}/${typeLabel}`;

  let next;
  if (_indexCounter.has(key)) {
    next = _indexCounter.get(key);
  } else {
    // 처음 호출이면 1부터 시작 (또는 폴더에 이미 있는 파일 개수만큼 건너뜀)
    next = 1;
    // 안전을 위해 최대 100까지만 확인 (있으면 다음 인덱스로)
    while (next < 100) {
      try {
        await unitDir.getFileHandle(`${typeLabel}${next}.jpg`, { create: false });
        next++;
      } catch(e) {
        break; // NotFoundError = 빈 슬롯
      }
    }
  }

  _indexCounter.set(key, next + 1);
  return next;
}

function clearDirIndexCache() {
  _indexCounter.clear();
}

// 동시 쓰기 방지용 순차 처리 락
let _writeLock = Promise.resolve();

// 저장 시도 — Android에서는 즉시 시도하지 않고 큐에만 적재
// (사용자 제스처 컨텍스트 밖에서 쓰기는 InvalidStateError 발생)
async function tryAutoSave(photo, unitName, typeLabel) {
  if (!photoFolderHandle) return;
  if (!photo || !photo.id) return;

  // 이미 저장된 사진이면 스킵
  if (photo.savedToFolder || _savedPhotoIds.has(photo.id)) return;

  // 큐에 이미 같은 ID가 있으면 스킵
  if (pendingSaves.some(p => p.photo.id === photo.id)) return;

  // ★ Android Chrome에서는 자동 시도가 InvalidStateError를 일으킴
  // → 무조건 큐에 적재하고, 사용자가 "지금 저장" 버튼을 눌러야 처리
  pendingSaves.push({ photo, unitName, typeLabel });
  updatePendingUI();
}

// 호수별 번호 매핑 (1호 → work01, 2호 → work02, ...)
// 앱 실행 중 동일 호수는 같은 번호 유지
const _unitWorkNumber = new Map();
function getWorkNumber(unitName) {
  if (!_unitWorkNumber.has(unitName)) {
    _unitWorkNumber.set(unitName, _unitWorkNumber.size + 1);
  }
  return String(_unitWorkNumber.get(unitName)).padStart(2, '0');
}

// 실제 쓰기 (한 장) — 간결한 영문 폴더/파일명
// 구조: [선택폴더]/[YYYY-MM-DD]/workNN/imageNN.jpg
async function doWriteOne(photo, unitName, typeLabel) {
  const date = document.getElementById('workDate').value || new Date().toISOString().split('T')[0];

  let step = 'init';
  try {
    step = 'Blob 변환';
    const blob = dataURLtoBlob(photo.dataUrl);
    if (blob.size === 0) throw new Error('Blob 크기 0');

    // 인덱스 결정 (타입별 카운터)
    step = '인덱스 결정';
    const idxKey = `${date}/${unitName}/${typeLabel}`;
    let idx = _indexCounter.get(idxKey) || 1;
    _indexCounter.set(idxKey, idx + 1);

    // 호수 → workNN 번호
    const workNum = getWorkNumber(unitName);

    // 타입 프리픽스: B=before, A=after, S1=special1, ...
    const typePrefix = typeLabel === '전' ? 'B'
                     : typeLabel === '후' ? 'A'
                     : typeLabel.replace(/^특이(\d+)_?$/, 'S$1').replace(/[^A-Za-z0-9]/g, '');

    // 폴더 구조: [루트] / [날짜] / workNN / [타입]imageNN.jpg
    step = '날짜폴더';
    const dateDir = await photoFolderHandle.getDirectoryHandle(date, { create: true });

    step = '작업폴더';
    const workDir = await dateDir.getDirectoryHandle(`work${workNum}`, { create: true });

    step = '파일핸들';
    const fname = `${typePrefix}_image${String(idx).padStart(2, '0')}.jpg`;
    const fh = await workDir.getFileHandle(fname, { create: true });

    step = 'createWritable';
    const w = await fh.createWritable();

    step = 'write';
    await w.write(blob);

    step = 'close';
    await w.close();

  } catch(e) {
    throw new Error(`[${step}] ${e.name||'Error'}: ${e.message}`);
  }
}

// 한글/유니코드 문자를 ASCII로 안전 변환
function toShortHash(str) {
  if (!str) return 'x';
  const ascii = str.replace(/[^A-Za-z0-9]/g, '');
  const hasNonAscii = /[^\x00-\x7F]/.test(str);
  if (!hasNonAscii && ascii.length > 0) {
    return ascii.substring(0, 20);
  }
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash = hash & hash;
  }
  const h = Math.abs(hash).toString(36);
  return ascii ? `${ascii.substring(0, 10)}${h}` : `u${h}`;
}

// 사용자가 "지금 저장" 버튼 클릭 시 호출 — 사용자 제스처 컨텍스트
async function flushPendingSaves() {
  if (pendingSaves.length === 0) return;
  if (!photoFolderHandle) { showToast('폴더가 설정되지 않았습니다', 'err'); return; }

  // ★ 핵심: 이미 granted면 requestPermission 건너뛰기 (제스처 보존)
  let permOk = false;
  try {
    const curPerm = await photoFolderHandle.queryPermission({ mode: 'readwrite' });
    if (curPerm === 'granted') {
      permOk = true;
    } else {
      // 권한 없을 때만 요청 (이 경우 다음 번엔 queryPermission만 쓰게 됨)
      const newPerm = await photoFolderHandle.requestPermission({ mode: 'readwrite' });
      permOk = (newPerm === 'granted');
    }
  } catch(e) {
    showToast('📁 권한 확인 실패: ' + e.message, 'err');
    return;
  }

  if (!permOk) {
    showToast('📁 폴더 권한이 거부됐습니다', 'err');
    return;
  }
  updateFolderUI(photoFolderHandle, 'granted');

  showOverlay('저장 중...');
  const total = pendingSaves.length;
  let ok = 0, fail = 0, skipped = 0;
  const remaining = [];
  const errorMessages = [];
  let firstErrorIsInvalidState = false;

  for (let i = 0; i < pendingSaves.length; i++) {
    const item = pendingSaves[i];
    setProg((i / total) * 100, `${i+1} / ${total} 저장 중`);

    if (item.photo.savedToFolder || _savedPhotoIds.has(item.photo.id)) {
      skipped++;
      continue;
    }

    // 최대 3번 재시도
    let success = false;
    let lastErr = null;
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        await doWriteOne(item.photo, item.unitName, item.typeLabel);
        item.photo.savedToFolder = true;
        _savedPhotoIds.add(item.photo.id);
        ok++;
        success = true;
        break;
      } catch(e) {
        lastErr = e;
        await sleep(100 + attempt * 200);  // 재시도 전 대기
      }
    }

    if (!success) {
      console.warn('flush 실패:', lastErr.name, lastErr.message, item);
      fail++;
      remaining.push(item);
      errorMessages.push(`[${item.unitName} ${item.typeLabel}] ${lastErr.name||'Error'}: ${lastErr.message}`);
      if (lastErr.name === 'InvalidStateError') firstErrorIsInvalidState = true;
    }

    await sleep(50);  // ★ 각 저장 사이 쿨다운
  }

  pendingSaves = remaining;
  sessionAutoSave();
  hideOverlay();
  updatePendingUI();

  if (fail > 0) {
    // InvalidStateError면 폴더 핸들 캐시 문제 → 폴더 다시 선택 안내
    if (firstErrorIsInvalidState) {
      showDebugPanel(
        `⚠️ ${ok}장 성공, ${fail}장 실패\n\n` +
        `🔍 원인: Android Chrome의 폴더 핸들 캐시 문제\n\n` +
        `✅ 해결법:\n` +
        `1. "📁 폴더 변경" 버튼을 누르세요\n` +
        `2. 같은 폴더(작업사진)를 다시 선택하세요\n` +
        `3. "💾 지금 저장" 버튼을 다시 누르세요\n\n` +
        `(앱을 새로 열거나 페이지를 새로고침해도 같은 효과)\n\n` +
        `── 상세 에러 ──\n` + errorMessages.join('\n\n')
      );
    } else {
      showDebugPanel(`⚠️ ${ok}장 성공, ${fail}장 실패\n\n` + errorMessages.join('\n\n'));
    }
  } else {
    let msg = `✅ ${ok}장 저장 완료`;
    if (skipped > 0) msg += ` (${skipped}장 이미 저장됨)`;
    showToast(msg, 'ok');
  }
}

// 화면에 디버그 메시지를 영구 표시 (탭하면 닫힘)
function showDebugPanel(text) {
  let panel = document.getElementById('debugPanel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'debugPanel';
    panel.style.cssText = `
      position:fixed;top:80px;left:10px;right:10px;z-index:9999;
      background:#fff;border:2px solid var(--dn);border-radius:10px;
      padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,0.3);
      max-height:60vh;overflow-y:auto;cursor:pointer;
      font-size:12px;line-height:1.6;color:#333;font-family:monospace;
      white-space:pre-wrap;word-break:break-word;
    `;
    panel.addEventListener('click', () => panel.remove());
    document.body.appendChild(panel);
  }
  panel.textContent = '🔴 디버그 정보 (탭하면 닫힘)\n\n' + text;
}

}

// 저장됨 상태 초기화 — 모든 사진의 "저장됨" 표시를 지우고 재저장할 수 있게
function resetSavedState() {
  if (!confirm('모든 사진의 "저장됨" 표시를 초기화할까요?\n\n그 후 "모든사진저장"을 누르면 전체를 다시 저장합니다.')) return;

  let count = 0;
  for (const u of units) {
    for (const p of u.before) {
      if (typeof p === 'object' && p.savedToFolder) { p.savedToFolder = false; count++; }
    }
    for (const p of u.after) {
      if (typeof p === 'object' && p.savedToFolder) { p.savedToFolder = false; count++; }
    }

    }
  } catch(e) { showToast('권한 확인 실패: ' + e.message, 'err'); return; }

  if (!permOk) { showToast('📁 폴더 권한이 거부됐습니다', 'err'); return; }
  updateFolderUI(photoFolderHandle, 'granted');

  // 이미 저장됐다고 표시된 사진 개수 확인
  const alreadyMarked = units.reduce((s, u) => {
    const count = [...u.before, ...u.after, ...u.specials.flatMap(sp => sp.photos)]
      .filter(p => typeof p === 'object' && p.savedToFolder).length;
    return s + count;
  }, 0);

  // 이미 저장됨으로 표시된 게 있으면 재저장 여부 묻기
  let forceResave = false;
  if (alreadyMarked > 0) {
    forceResave = confirm(
      `💡 ${alreadyMarked}장이 "이미 저장됨"으로 표시되어 있습니다.\n\n` +
      `확인: 모든 사진을 다시 저장 (파일이 0바이트이거나 깨졌을 경우)\n` +
      `취소: 새로 추가된 사진만 저장`
    );
  }

  const date = document.getElementById('workDate').value || new Date().toISOString().split('T')[0];
  const apt  = document.getElementById('aptName').value || '작업';
  const aptSafe = apt.replace(/[\/\\:*?"<>|]/g, '_');

  showOverlay('사진 저장 중...');
  let saved = 0, skipped = 0;
  const errors = [];

  // 사진 1장 저장 헬퍼
  async function savePhoto(p, unitName, typeLabel, idx) {
    // forceResave가 아닐 때만 스킵 체크
    if (!forceResave && typeof p === 'object' && (p.savedToFolder || _savedPhotoIds.has(p.id))) {
      skipped++;
      return;
    }
    // 영문 폴더/파일명
    const workNum = getWorkNumber(unitName);
    const typePrefix = typeLabel === '전' ? 'B'
                     : typeLabel === '후' ? 'A'
                     : typeLabel.replace(/^특이(\d+)_?$/, 'S$1').replace(/[^A-Za-z0-9]/g, '');
    const fname = `${typePrefix}_image${String(idx).padStart(2, '0')}.jpg`;

    // 최대 3번 재시도
    let lastErr = null;
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        const blob = dataURLtoBlob(photoUrl(p));
        if (blob.size === 0) throw new Error('Blob 크기 0');

        // 폴더 구조: [루트] / [날짜] / workNN / 파일명
        const dateDir = await photoFolderHandle.getDirectoryHandle(date, { create: true });
        const workDir = await dateDir.getDirectoryHandle(`work${workNum}`, { create: true });

        const fh = await workDir.getFileHandle(fname, { create: true });
        const w  = await fh.createWritable();
        await w.write(blob);
        await w.close();

        if (typeof p === 'object') {
          p.savedToFolder = true;
          _savedPhotoIds.add(p.id);
        }
        saved++;
        return;
      } catch(e) {
        lastErr = e;
        await sleep(100 + attempt * 200);
      }
    }
    throw lastErr;
  }

  try {
    for (const u of units) {
      for (let i = 0; i < u.before.length; i++) {
        setProg(((saved+skipped) / totalPhotos) * 100, `${saved+skipped+1} / ${totalPhotos}`);
        try { await savePhoto(u.before[i], u.name, '전', i+1); }
        catch(e) { errors.push(`${u.name} 전${i+1}: ${e.message}`); }
        await sleep(50);
      }
      for (let i = 0; i < u.after.length; i++) {
        setProg(((saved+skipped) / totalPhotos) * 100, `${saved+skipped+1} / ${totalPhotos}`);
        try { await savePhoto(u.after[i], u.name, '후', i+1); }
        catch(e) { errors.push(`${u.name} 후${i+1}: ${e.message}`); }
        await sleep(50);
      }
      for (let si = 0; si < u.specials.length; si++) {
        for (let pi = 0; pi < u.specials[si].photos.length; pi++) {
          setProg(((saved+skipped) / totalPhotos) * 100, `${saved+skipped+1} / ${totalPhotos}`);
          try { await savePhoto(u.specials[si].photos[pi], u.name, `특이${si+1}_`, pi+1); }
          catch(e) { errors.push(`${u.name} 특이${si+1}_${pi+1}: ${e.message}`); }
          await sleep(50);
        }
      }
    }

    // 매핑 정보 파일 저장 (work01 = 어느 호수인지)
    try {
      const lines = [
        `에어컨 청소 작업 사진 — ${new Date().toLocaleString('ko-KR')}`,
        `날짜: ${date}`,
        `아파트명: ${apt}`,
        `담당자: ${document.getElementById('workerName').value || ''}`,
        '',
        '── 폴더 구조 ──',
        `${date}/workNN/[B/A/S]_imageNN.jpg`,
        'B = 작업전 (Before)',
        'A = 작업후 (After)',
        'S1, S2... = 특이사항',
        '',
        '── 호수 매핑 ──',
      ];
      for (const u of units) {
        const num = getWorkNumber(u.name);
        lines.push(`work${num} = ${u.name}  (전 ${u.before.length}장 · 후 ${u.after.length}장 · 특이 ${u.specials.length}건)`);
      }
      const infoBlob = new Blob([lines.join('\n')], { type: 'text/plain; charset=utf-8' });
      const dateDir = await photoFolderHandle.getDirectoryHandle(date, { create: true });
      const infoFh = await dateDir.getFileHandle('_info.txt', { create: true });
      const infoW = await infoFh.createWritable();
      await infoW.write(infoBlob);
      await infoW.close();
    } catch(e) {
      console.warn('정보 파일 저장 실패:', e);
    }

    sessionAutoSave();
    hideOverlay();
    renderAll();
    if (errors.length > 0) {
      showDebugPanel(`✅ ${saved}장 저장 완료, ⚠️ ${errors.length}장 실패\n\n첫 에러:\n` + errors.slice(0,3).join('\n'));
    } else if (skipped > 0) {
      showToast(`✅ ${saved}장 저장 (${skipped}장 이미 저장됨)`, 'ok');
    } else {
      showToast(`✅ ${saved}장 저장 완료`, 'ok');
    }
  } catch(e) {
    hideOverlay();
    if (e.name !== 'AbortError') showToast('저장 실패: ' + e.message, 'err');
  }
}

/* UTILS */
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showImg(src){document.getElementById('modalImg').src=src;document.getElementById('imgModal').classList.add('open');}
function showOverlay(t){document.getElementById('ovTitle').textContent=t;document.getElementById('progFl').style.width='0%';document.getElementById('progLb').textContent='';document.getElementById('overlay').classList.add('show');}
function setProg(p,l){document.getElementById('progFl').style.width=p+'%';document.getElementById('progLb').textContent=l;}
function hideOverlay(){document.getElementById('overlay').classList.remove('show');}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast show ${type}`;clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',3500);}

/* ═══════════════════════════════
   이미지 최적화 (리사이즈 + 압축 + 세로→가로 크롭)
   - 세로사진: 4:3 가로 비율로 중앙 크롭
   - 최대 1600px 리사이즈
   - JPEG 품질 0.78
═══════════════════════════════ */
const IMG_MAX_PX  = 1600;
const IMG_QUALITY = 0.78;
const TARGET_RATIO = 4 / 3;   // 가로:세로 = 4:3

function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const origW = img.naturalWidth;
        const origH = img.naturalHeight;
        const origBytes = Math.round(ev.target.result.length * 0.75);

        // ── 소스 크롭 영역 계산 ──
        let srcX = 0, srcY = 0, srcW = origW, srcH = origH;
        const currentRatio = origW / origH;

        if (currentRatio < TARGET_RATIO) {
          // 세로 사진 → 4:3 가로로 중앙 크롭
          srcH = Math.round(origW / TARGET_RATIO);
          srcY = Math.round((origH - srcH) / 2);
        } else if (currentRatio > TARGET_RATIO * 1.5) {
          // 매우 넓은 파노라마 → 4:3으로 중앙 크롭
          srcW = Math.round(origH * TARGET_RATIO);
          srcX = Math.round((origW - srcW) / 2);
        }
        // 이미 4:3에 가까운 가로 사진 → 그대로

        // ── 출력 크기 (장변 1600px 제한) ──
        let outW = srcW, outH = srcH;
        const maxSide = Math.max(outW, outH);
        if (maxSide > IMG_MAX_PX) {
          const ratio = IMG_MAX_PX / maxSide;
          outW = Math.round(outW * ratio);
          outH = Math.round(outH * ratio);
        }

        // ── Canvas에 크롭하여 그리기 ──
        const canvas = document.createElement('canvas');
        canvas.width  = outW;
        canvas.height = outH;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, outW, outH);
        ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, outW, outH);

        const dataUrl   = canvas.toDataURL('image/jpeg', IMG_QUALITY);
        const newBytes  = Math.round(dataUrl.length * 0.75);
        const origKB    = Math.round(origBytes / 1024);
        const newKB     = Math.round(newBytes  / 1024);
        const savedKB   = origKB - newKB;
        const wasCropped = currentRatio < TARGET_RATIO;

        resolve({ dataUrl, origKB, newKB, savedKB, w: outW, h: outH, wasCropped });
      };
      img.onerror = () => resolve({ dataUrl: ev.target.result, origKB:0, newKB:0, savedKB:0, w:0, h:0, wasCropped:false });
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}
