<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="에어컨보고서">
<meta name="application-name" content="에어컨보고서">
<meta name="theme-color" content="#3d8ef0">
<title>평택에어컨1004 - 작업 보고서</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%233d8ef0'/%3E%3Cstop offset='100%25' stop-color='%2300c9a7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='90' fill='url(%23g)'/%3E%3Ctext x='50%25' y='50%25' font-size='300' text-anchor='middle' dominant-baseline='central' fill='%23fff'%3E%E2%9D%84%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%233d8ef0'/%3E%3Cstop offset='100%25' stop-color='%2300c9a7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='90' fill='url(%23g)'/%3E%3Ctext x='50%25' y='50%25' font-size='300' text-anchor='middle' dominant-baseline='central' fill='%23fff'%3E%E2%9D%84%3C/text%3E%3C/svg%3E">

<!-- 외부 라이브러리 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- 스타일 -->

<link rel="stylesheet" href="./styles.css">
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">
    <div class="logo-ic">❄️</div>
    <div><div class="logo-tx">평택에어컨1004</div><div class="logo-sb">작업 보고서 생성기</div></div>
    <div class="save-status" id="saveStatus">💾 저장됨</div>
    <button class="hdr-toggle" id="hdrToggle" title="메뉴 접기/펼치기">▲</button>
  </div>
  <div class="hdr-collapsible" id="hdrCollapsible">
    <div class="hdr-fields">
      <div class="hf"><label data-i18n="main.workName">작업명</label><input id="aptName" data-i18n-placeholder="main.placeholder.workName" placeholder="작업명을 입력하세요"></div>
      <div class="hf"><label data-i18n="main.workDate">작업일자</label><input id="workDate" type="date"></div>
      <div class="hf"><label data-i18n="main.worker">담당자</label><input id="workerName" data-i18n-placeholder="main.placeholder.workerName" placeholder="성함"></div>
    </div>
    <div class="hdr-btns">
      <!-- 1행: 데이터 관리 (4열) -->
      <button class="co-hdr-btn" id="btnSettings" data-i18n="btn.settings">⚙️ 설정</button>
      <button class="btn b-orange" id="btnNew" data-i18n="btn.newWork">🆕 새작업</button>
      <button class="btn b-gold" id="btnSave" data-i18n="btn.save">💾 저장</button>
      <button class="btn b-ghost" id="btnLoad" data-i18n="btn.load">📂 불러오기</button>
      <!-- 2행: 보고서 출력 -->
      <button class="btn b-blue" id="btnGen" disabled style="grid-column:span 2" data-i18n="btn.preview">📄 미리보기</button>
      <button class="btn b-green" id="btnPDF" disabled data-i18n="btn.pdf">⬇️ PDF</button>
      <button class="btn b-orange" id="btnJPG" disabled data-i18n="btn.jpg">🖼️ JPG</button>
    </div>
  </div>
</div>

<div class="main">
  <!-- 회사 정보 (모달에서 관리 - 이 섹션은 표시 안 됨) -->
  <div class="cmp-sec" style="display:none!important;"></div>

  <div class="stats">
    <div class="stat"><div class="stat-lbl" data-i18n="stats.totalUnits">총 호수</div><div class="stat-val c-bl" id="sTot">0</div></div>
    <div class="stat"><div class="stat-lbl" data-i18n="stats.completed">전후 완비</div><div class="stat-val c-gr" id="sCmp">0</div></div>
    <div class="stat"><div class="stat-lbl" data-i18n="stats.incomplete">미완료</div><div class="stat-val c-wn" id="sPrt">0</div></div>
    <div class="stat"><div class="stat-lbl" data-i18n="stats.totalPhotos">총 사진</div><div class="stat-val c-mu" id="sPh">0</div></div>
  </div>

  <div class="add-row">
    <input class="add-inp" id="newName" data-i18n-placeholder="unit.placeholder" placeholder="호수 입력 (예: 101동 201호)">
    <button class="btn b-blue" id="btnAdd" data-i18n="unit.add">➕ 추가</button>
    <button class="btn b-ghost" id="btnBulk" style="font-size:11px" data-i18n="unit.bulk">📋 일괄</button>
    <button class="btn b-ghost" id="btnClear" style="font-size:11px;color:var(--dn)">🗑️</button>
  </div>

  <div class="toolbar">
    <input class="srch" id="srch" data-i18n-placeholder="unit.search" placeholder="🔍 호수 검색">
    <button class="btn b-ghost b-xs" id="btnExp" data-i18n="unit.expandAll">전체 펼치기</button>
    <button class="btn b-ghost b-xs" id="btnCol" data-i18n="unit.collapseAll">전체 접기</button>
  </div>

  <!-- 폴더 관리는 설정 모달에서만 - 코드 호환용 숨긴 요소 -->
  <div id="folderBar" hidden style="display:none!important;visibility:hidden;position:absolute;left:-9999px;width:0;height:0;overflow:hidden;pointer-events:none;">
    <span id="folderStatusText"></span>
    <span id="folderPathText"></span>
    <span id="pendingSaveBar"><span id="pendingSaveCount">0</span></span>
    <button id="btnSetFolder"></button>
    <button id="btnClearFolder"></button>
    <button id="btnResumeFolder"></button>
    <button id="btnFlushNow"></button>
    <button id="btnResetSaved"></button>
  </div>

  <div class="unit-list" id="uList"></div>
</div>

<!-- 설정 모달 -->
<div class="co-modal" id="settingsModal">
  <div class="co-box" style="max-width:500px;">
    <div class="co-head">
      <div class="co-head-title">⚙️ 설정</div>
      <button class="btn b-ghost b-xs" id="settingsClose">✕</button>
    </div>
    <div class="co-body" style="padding:16px;">

      <!-- 업체정보 -->
      <div class="set-sec">
        <div class="set-sec-title" data-i18n="set.company">🏢 업체정보</div>
        <div id="setCoSummary" style="font-size:12px;color:var(--mu);background:var(--sf2);border-radius:8px;padding:10px 12px;margin-bottom:8px;line-height:1.6;display:none;"></div>
        <button class="btn b-blue" id="setOpenCoInfo" style="width:100%;justify-content:center;" data-i18n="set.company.edit">업체정보 편집</button>
      </div>

      <!-- 저장 폴더 -->
      <div class="set-sec">
        <div class="set-sec-title" data-i18n="set.folder">📁 저장 폴더</div>
        <div id="setFolderStatus" style="font-size:13px;color:var(--mu);margin-bottom:8px;word-break:break-all;" data-i18n="set.folder.unset">폴더 미설정</div>
        <div style="display:flex;gap:6px;">
          <button class="btn b-ghost" id="setChangeFolder" style="flex:1;justify-content:center;" data-i18n="set.folder.set">폴더 선택/변경</button>
          <button class="btn b-red" id="setClearFolder" style="flex:1;justify-content:center;display:none;" data-i18n="set.folder.clear">해제</button>
        </div>
      </div>

      <!-- 앱 테마 (선택 버튼) -->
      <div class="set-sec">
        <div class="set-sec-title" data-i18n="set.theme">🎨 앱 테마</div>
        <button class="btn b-ghost" id="btnPickAppTheme" style="width:100%;justify-content:space-between;">
          <span id="curAppThemeLabel">기본 (다크 블루)</span>
          <span style="opacity:.6;">▶</span>
        </button>
      </div>

      <!-- 보고서 테마 (선택 버튼) -->
      <div class="set-sec">
        <div class="set-sec-title" data-i18n="set.reportTheme">📄 보고서 테마</div>
        <button class="btn b-ghost" id="btnPickReportTheme" style="width:100%;justify-content:space-between;">
          <span id="curReportThemeLabel">기본</span>
          <span style="opacity:.6;">▶</span>
        </button>
      </div>

      <!-- 글자 크기 -->
      <div class="set-sec">
        <div class="set-sec-title" data-i18n="set.fontSize">🔤 글자 크기</div>
        <div class="fs-control">
          <button class="btn b-ghost" id="fsDown" style="min-width:48px;font-size:18px;">－</button>
          <div class="fs-preview" id="fsPreview">가나다 ABC</div>
          <button class="btn b-ghost" id="fsUp" style="min-width:48px;font-size:18px;">＋</button>
        </div>
        <div style="font-size:11px;color:var(--mu);margin-top:6px;text-align:center;">
          현재: <span id="fsLabel">보통</span>
        </div>
      </div>

      <!-- 언어 -->
      <div class="set-sec">
        <div class="set-sec-title" data-i18n="set.language">🌐 언어</div>
        <select class="co-input" id="langSelect">
          <option value="ko">한국어</option>
          <option value="en">English</option>
          <option value="ja" disabled>日本語 (준비 중)</option>
        </select>
      </div>


    </div>
    <div class="co-foot">
      <button class="btn b-blue" id="settingsCloseBtn" style="width:100%;justify-content:center;">완료</button>
    </div>
  </div>
</div>

<!-- 업체 정보 설정 모달 -->
<div class="co-modal" id="coModal">
  <div class="co-box">
    <div class="co-head">
      <div class="co-head-title">🏢 업체 정보 설정</div>
      <button class="btn b-ghost b-xs" id="coModalClose">✕</button>
    </div>
    <div class="co-body">

      <!-- 아이콘/로고 선택 -->
      <div class="co-field">
        <label>업체 아이콘 / 로고 <span class="co-tag">표지 표시</span></label>
        <div class="co-icon-preview-row">
          <div class="co-icon-preview" id="coIconPreview">❄</div>
          <div class="co-icon-info">
            <div class="co-icon-info-tx" id="coIconInfo">기본 아이콘</div>
            <button class="btn b-ghost b-xs" id="coIconClear" style="display:none;">↻ 기본으로</button>
          </div>
        </div>
        <div class="co-icon-grid">
          <button class="co-icon-pick" data-ic="❄">❄</button>
          <button class="co-icon-pick" data-ic="❄️">❄️</button>
          <button class="co-icon-pick" data-ic="🌬️">🌬️</button>
          <button class="co-icon-pick" data-ic="🧊">🧊</button>
          <button class="co-icon-pick" data-ic="💧">💧</button>
          <button class="co-icon-pick" data-ic="🛠️">🛠️</button>
          <button class="co-icon-pick" data-ic="🔧">🔧</button>
          <button class="co-icon-pick" data-ic="⚙️">⚙️</button>
          <button class="co-icon-pick" data-ic="🏠">🏠</button>
          <button class="co-icon-pick" data-ic="🏢">🏢</button>
          <button class="co-icon-pick" data-ic="✨">✨</button>
          <button class="co-icon-pick" data-ic="⭐">⭐</button>
          <label class="co-icon-pick co-icon-upload">
            📷
            <input type="file" id="coIconFile" accept="image/*" style="display:none;">
          </label>
        </div>
      </div>

      <div class="co-field">
        <label>업체명 (상호) <span class="co-tag">표지 큰 글씨</span></label>
        <input class="co-input" id="coName" placeholder="예: 평택에어컨1004">
      </div>

      <div class="co-field">
        <label>법인명 / 부제 <span class="co-tag">표지 작은 글씨</span></label>
        <input class="co-input" id="coBrand" placeholder="예: 주식회사 미래에스엠 / 에어컨 전문">
      </div>

      <div class="co-row">
        <div class="co-field">
          <label>대표 연락처</label>
          <input class="co-input" id="coTel" placeholder="010-0000-0000" type="tel">
        </div>
        <div class="co-field">
          <label>사업자 번호</label>
          <input class="co-input" id="coBiz" placeholder="000-00-00000">
        </div>
      </div>

      <div class="co-field">
        <label>주소</label>
        <input class="co-input" id="coAddr" placeholder="예: 경기도 평택시 OO동 OOO">
      </div>

      <div class="co-row">
        <div class="co-field">
          <label>이메일</label>
          <input class="co-input" id="coEmail" placeholder="example@email.com" type="email">
        </div>
        <div class="co-field">
          <label>홈페이지 / SNS</label>
          <input class="co-input" id="coWeb" placeholder="https://...">
        </div>
      </div>

      <div class="co-field">
        <label>업체 소개 / 슬로건 <span class="co-tag">표지에 박스로 표시</span></label>
        <textarea class="co-textarea" id="coDesc" rows="4" placeholder="예시:&#10;에어컨 청소·설치·이전 전문&#10;평택·오산·수원·화성·안성 출장 서비스&#10;10년 이상 경력 전문가 직접 시공&#10;100% 만족 보장"></textarea>
        <div style="font-size:10px;color:var(--mu);margin-top:4px;">💡 줄바꿈하면 보고서에 그대로 줄바꿈되어 표시됩니다</div>
      </div>

      <hr class="co-divider">

      <div>
        <div class="co-preview-label">📄 보고서 표지 미리보기</div>
        <div class="co-preview" id="coPreview">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <div class="co-preview-ic" id="pvIc" style="width:42px;height:42px;background:linear-gradient(135deg,#3d8ef0,#00c9a7);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0;">❄</div>
            <div style="min-width:0;flex:1;">
              <div class="co-preview-name" id="pvName">업체명 입력 전</div>
              <div class="co-preview-brand" id="pvBrand" style="font-size:11px;opacity:.85;color:#a8d4ff;font-weight:600;display:none;"></div>
            </div>
          </div>
          <div class="co-preview-desc" id="pvDesc" style="display:none;background:rgba(255,255,255,.08);border-left:2px solid #4dd0e1;padding:8px 11px;border-radius:5px;font-size:10px;line-height:1.6;margin-bottom:9px;color:rgba(255,255,255,.92);"></div>
          <div class="co-preview-tel" id="pvTel" style="display:none;background:linear-gradient(135deg,rgba(77,208,225,.25),rgba(0,201,167,.15));border:1px solid rgba(77,208,225,.4);border-radius:7px;padding:8px 11px;display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <span style="font-size:18px;">📞</span>
            <div style="flex:1;">
              <div style="font-size:8px;color:#80deea;font-weight:700;letter-spacing:.1em;">대표 연락처</div>
              <div id="pvTelNum" style="font-size:15px;font-weight:900;color:#fff;font-family:'DM Mono',monospace;line-height:1;"></div>
            </div>
          </div>
          <div class="co-preview-sub" id="pvSub" style="font-size:9px;opacity:.7;">사업자번호 등 부가정보</div>
        </div>
      </div>

    </div>
    <div class="co-foot">
      <button class="btn b-ghost" id="coModalCancel">취소</button>
      <button class="btn b-green" id="coModalSave">✅ 저장하기</button>
    </div>
  </div>
</div>

<!-- 저장 이름 다이얼로그 -->
<div class="dlg-backdrop" id="saveDlg">
  <div class="dlg-box">
    <div class="dlg-head">
      <div class="dlg-title">💾 저장 이름 입력</div>
      <button class="btn b-ghost b-xs" id="saveDlgClose">✕</button>
    </div>
    <div class="dlg-body">
      <div class="dlg-label">저장 이름</div>
      <input class="dlg-input" id="saveNameInp" placeholder="예: OO아파트 1차 작업">
      <div class="dlg-hint" id="saveHint"></div>
    </div>
    <div class="dlg-foot">
      <button class="btn b-ghost" id="saveDlgCancel">취소</button>
      <button class="btn b-gold" id="saveDlgOk">💾 저장하기</button>
    </div>
  </div>
</div>

<!-- 불러오기 목록 -->
<div class="sl-modal" id="slModal">
  <div class="sl-box">
    <div class="sl-head">
      <div class="sl-title">📂 저장된 작업 목록</div>
      <button class="btn b-ghost b-xs" id="btnSlClose">✕ 닫기</button>
    </div>
    <div class="sl-body" id="slBody"></div>
  </div>
</div>

<!-- 사진 순서 편집 모달 (전체화면) -->
<!-- 사진 순서 편집 모달 (전체화면) -->
<div class="rd-modal" id="reorderModal">
  <div class="rd-box">
    <div class="rd-head">
      <div class="rd-title" id="reorderTitle">🔄 사진 순서 편집</div>
      <button class="rd-close-btn" id="reorderClose">✕</button>
    </div>
    <div class="rd-body" id="reorderBody"></div>
    <div class="rd-foot">
      <button class="btn b-ghost" id="reorderCancel">취소</button>
      <button class="btn b-green" id="reorderSave">✅ 저장</button>
    </div>
  </div>
</div>

<!-- 테마 선택 팝업 -->
<div class="co-modal" id="themePickerModal">
  <div class="co-box" style="max-width:480px;">
    <div class="co-head">
      <div class="co-head-title" id="themePickerTitle">🎨 테마 선택</div>
      <button class="btn b-ghost b-xs" id="themePickerClose">✕</button>
    </div>
    <div class="co-body" id="themePickerBody" style="padding:14px;"></div>
  </div>
</div>

<!-- 미리보기 -->
<div class="pv-modal" id="pvModal">
  <div class="pv-bar">
    <div class="pv-title">📄 보고서 미리보기</div>
    <div class="pv-btns">
      <button class="btn b-green" id="btnPDF2">⬇️ PDF</button>
      <button class="btn b-orange" id="btnJPG2">🖼️ JPG</button>
      <button class="btn b-ghost" id="btnPvClose">✕ 닫기</button>
    </div>
  </div>
  <div class="pv-scroll" id="pvScroll"></div>
</div>

<!-- 이미지 모달 -->
<div class="img-modal" id="imgModal">
  <div class="img-x" id="imgX">✕</div>
  <img id="modalImg" src="" alt="">
</div>

<!-- 프로그레스 오버레이 -->
<div class="overlay" id="overlay">
  <div class="ov-box">
    <div class="ov-title" id="ovTitle">처리 중...</div>
    <div class="prog-tr"><div class="prog-fl" id="progFl"></div></div>
    <div class="prog-lb" id="progLb"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="rpWrap" style="position:fixed;left:-9999px;top:0;z-index:-1;pointer-events:none;"></div>


<!-- 스크립트 (순서 중요) -->
<script src="./js/i18n.js"></script>
<script src="./js/db.js"></script>
<script src="./js/state.js"></script>
<script src="./js/image.js"></script>
<script src="./js/render.js"></script>
<script src="./js/events.js"></script>
<script src="./js/dialogs.js"></script>
<script src="./js/report.js"></script>
<script src="./js/folder.js"></script>
<script src="./js/settings.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
